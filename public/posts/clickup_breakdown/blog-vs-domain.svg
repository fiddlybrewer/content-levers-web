<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 400" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
  <rect width="700" height="400" fill="#fafafa" rx="12"/>

  <text x="80" y="32" font-size="15" font-weight="600" fill="#1a1a1a">Full domain vs. blog traffic</text>

  <!-- Y axis: 0 to 3M. Chart area y=50..340 = 290px -->
  <line x1="80" y1="340" x2="640" y2="340" stroke="#e5e5e5" stroke-width="1"/>
  <line x1="80" y1="243" x2="640" y2="243" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="147" x2="640" y2="147" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="4,4"/>
  <line x1="80" y1="50" x2="640" y2="50" stroke="#e5e5e5" stroke-width="1" stroke-dasharray="4,4"/>

  <text x="72" y="344" font-size="11" fill="#888" text-anchor="end">0</text>
  <text x="72" y="247" font-size="11" fill="#888" text-anchor="end">1M</text>
  <text x="72" y="151" font-size="11" fill="#888" text-anchor="end">2M</text>
  <text x="72" y="54" font-size="11" fill="#888" text-anchor="end">3M</text>

  <!-- 6 data points: Jan25, Apr25, Jul25, Oct25, Jan26, Apr26
       x: 80..640 = 560px, 5 gaps = 112px each
       Domain scale: y = 340 - (value/3000000)*290
       Jan25: 2731124 -> 340-264.0 = 76.0
       Apr25: 2009739 -> 340-194.3 = 145.7
       Jul25: 2022861 -> 340-195.5 = 144.5
       Oct25: 1656915 -> 340-160.2 = 179.8
       Jan26: 1624570 -> 340-157.0 = 183.0
       Apr26: 1151517 -> 340-111.3 = 228.7

       Blog scale: same
       Jan25: 1193114 -> 340-115.3 = 224.7
       Apr25: 492450  -> 340-47.6 = 292.4
       Jul25: 404029  -> 340-39.1 = 300.9
       Oct25: 134111  -> 340-13.0 = 327.0
       Jan26: 127325  -> 340-12.3 = 327.7
       Apr26: 28790   -> 340-2.8 = 337.2
  -->

  <!-- X labels -->
  <text x="80" y="360" font-size="10" fill="#888" text-anchor="middle">Jan 25</text>
  <text x="192" y="360" font-size="10" fill="#888" text-anchor="middle">Apr 25</text>
  <text x="304" y="360" font-size="10" fill="#888" text-anchor="middle">Jul 25</text>
  <text x="416" y="360" font-size="10" fill="#888" text-anchor="middle">Oct 25</text>
  <text x="528" y="360" font-size="10" fill="#888" text-anchor="middle">Jan 26</text>
  <text x="640" y="360" font-size="10" fill="#888" text-anchor="middle">Apr 26</text>

  <!-- Domain line (blue-gray) -->
  <polyline points="80,76 192,146 304,145 416,180 528,183 640,229" fill="none" stroke="#6b7280" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="80" cy="76" r="4" fill="#6b7280"/>
  <circle cx="640" cy="229" r="4" fill="#6b7280"/>

  <!-- Blog line (purple) -->
  <polyline points="80,225 192,292 304,301 416,327 528,328 640,337" fill="none" stroke="#7c3aed" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>
  <circle cx="80" cy="225" r="4" fill="#7c3aed"/>
  <circle cx="640" cy="337" r="4" fill="#7c3aed"/>

  <!-- Value labels -->
  <text x="80" y="68" font-size="10" fill="#6b7280" text-anchor="middle">2.73M</text>
  <text x="640" y="221" font-size="10" fill="#6b7280" text-anchor="middle">1.15M</text>
  <text x="80" y="218" font-size="10" fill="#7c3aed" text-anchor="middle">1.19M</text>
  <text x="640" y="350" font-size="10" fill="#7c3aed" text-anchor="middle">29K</text>

  <!-- Decline annotations -->
  <text x="640" y="245" font-size="9" fill="#6b7280" text-anchor="start" font-style="italic">  -58%</text>
  <text x="640" y="365" font-size="9" fill="#7c3aed" text-anchor="start" font-style="italic">  -97.6%</text>

  <!-- Legend -->
  <line x1="450" y1="26" x2="475" y2="26" stroke="#6b7280" stroke-width="2.5"/>
  <text x="480" y="30" font-size="11" fill="#6b7280">Full domain</text>
  <line x1="560" y1="26" x2="585" y2="26" stroke="#7c3aed" stroke-width="2.5"/>
  <text x="590" y="30" font-size="11" fill="#7c3aed">Blog only</text>
</svg>
